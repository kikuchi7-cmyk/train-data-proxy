name: Fetch Timetable
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Fetch Data
        run: |
          # APIサーバーがダメなら、GitHub上のオープンデータソースから取得を試みる
          # ※このURLは実験的なミラーです
          curl -L -o timetable.json "https://raw.githubusercontent.com/odpt/odpt-sample-data/master/station_timetable/JR-East.Takasaki.Miyahara.json"
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add timetable.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update timetable data" && git push)
