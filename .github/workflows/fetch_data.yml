- name: Fetch Latest Timetable
        run: |
          # 一時ファイルに保存を試みる
          if curl --connect-timeout 30 --retry 5 -L "https://api-tokyochallenge.odpt.org/api/v4/odpt:TrainTimetable?odpt:station=odpt.Station:JR-East.Takasaki.Miyahara" -o timetable_new.json; then
            # 取得成功かつ中身がある場合のみ、本番ファイルを上書き
            if [ -s timetable_new.json ]; then
              mv timetable_new.json timetable.json
              echo "Updated successfully"
            fi
          else
            echo "Server is down. Keeping the old timetable.json"
          fi
