name: Update Timetable Data

on:
  schedule:
    - cron: '*/30 * * * *' # 30分おきに実行（お好みで調整してください）
  workflow_dispatch: # 手動実行ボタンを有効化

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # すべての履歴を取得して競合を防ぐ

      - name: Fetch Latest Timetable
        run: |
          # データを取得してファイルに保存
          curl -L "https://api-tokyochallenge.odpt.org/api/v4/odpt:TrainTimetable?odpt:station=odpt.Station:JR-East.Takasaki.Miyahara" -o timetable.json
          # ※もしAPIキーが必要なURLだった場合は、以前使っていたURLに差し替えてください

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add timetable.json
          # 変更がある場合のみコミット
          git diff --quiet && git diff --staged --quiet || git commit -m "Update timetable data"
          # 強制的にメインブランチへ反映（競合エラーを回避）
          git push origin main --force
